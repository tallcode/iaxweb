services:
  iaxweb:
    # Built and published by .github/workflows/docker-publish.yml
    image: ghcr.io/tallcode/iaxweb:latest
    container_name: iaxweb
    restart: unless-stopped
    ports:
      # host 8059 -> container 3000
      - '8059:3000'
    environment:
      # Point this at your NATS cluster. On Docker Desktop use
      # host.docker.internal to reach a NATS server running on the host.
      NATS_SERVERS: ${NATS_SERVERS:-nats://host.docker.internal:4222}
      NATS_SUBJECT_PREFIX: ${NATS_SUBJECT_PREFIX:-iaxmon.nodes.1999}
      # Optional auth (leave unset to disable):
      NATS_USERNAME: ${NATS_USERNAME:-}
      NATS_PASSWORD: ${NATS_PASSWORD:-}
      NATS_TOKEN: ${NATS_TOKEN:-}
      ALLMON3_BASE_URL: ${ALLMON3_BASE_URL:-http://172.16.211.199/allmon3/}
      ALLMON3_REFRESH_INTERVAL_MS: ${ALLMON3_REFRESH_INTERVAL_MS:-30000}
      ALLMON3_REQUEST_TIMEOUT_MS: ${ALLMON3_REQUEST_TIMEOUT_MS:-10000}
